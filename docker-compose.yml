version: '3.8'

services:
  # 1. O Banco de Dados (PostgreSQL)
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha_secreta_123
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      # Persistência: Salva os dados num volume do Docker [cite: 204]
      - pgdata:/var/lib/postgresql/data

  # 2. A Sua Aplicação (Catalog Service)
  catalog:
    build: 
      context: ./catalog-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db  # Espera o banco iniciar antes de tentar subir
    environment:
      # 12-FACTOR:
      # Sobrescrevemos a config local (SQLite) por essa de produção (Postgres)
      - DATABASE_URL=postgresql://admin:senha_secreta_123@db:5432/catalog_db
    volumes:
      - ./catalog-service:/app
    restart: unless-stopped
    labels:
      - "logging=promtail"

  # 3. Prometheus - Coleta de Métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - default

  # 4. Grafana - Visualização de Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - default

  # 5. Loki - Armazenamento de Logs
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - default

  # 6. Promtail - Coleta de Logs
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - default

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
  loki_data: